name: Test apply Union configuration test for dataplattform-development

on:
  workflow_dispatch:

jobs:
  apply-union-config:
    name: Apply Union configuration
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v6
            
      - uses: ./actions/union-config
        with:
          manifest: union/utsa-dataplattform.yaml
          environment: dev

