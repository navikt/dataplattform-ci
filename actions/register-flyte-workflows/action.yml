name: Register Flyte Workflows
description: Installs flytekit via uv and registers all workflows in the current directory with a Flyte/Union cluster.

inputs:
  python-version:
    description: Python version to install via uv.
    required: false
    default: "3.12"
  union-endpoint:
    description: Endpoint of the Union/Flyte cluster (e.g. my-cluster.union.ai:443).
    required: true
  flyte-client-id:
    description: OAuth2 client ID for authenticating with the Flyte/Union cluster.
    required: true
  flyte-client-secret:
    description: OAuth2 client secret for authenticating with the Flyte/Union cluster.
    required: true
  flyte-project:
    description: Flyte project to register workflows into.
    required: true
  flyte-domain:
    description: Flyte domain to register workflows into.
    required: false
    default: development
  working-directory:
    description: Directory to run pyflyte register from. Defaults to the repo root.
    required: false
    default: "."
  python-index-url:
    description: Internal platform PyPI proxy (do not override)
    required: false
    default: https://europe-west1-python.pkg.dev/nav-data-images-prod/pypi/simple/

runs:
  using: composite
  steps:
    - name: Mask client secret
      shell: bash
      run: echo "::add-mask::${{ inputs.flyte-client-secret }}"

    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        github-token: ${{ github.token }}
        enable-cache: false
      env:
        UV_NATIVE_TLS: "true"
        NODE_EXTRA_CA_CERTS: /etc/ssl/certs/ca-certificates.crt

    - name: Get Google access token from Cloud Run service identity
      shell: bash
      run: |
        TOKEN="$(curl -s -H 'Metadata-Flavor: Google' \
          'http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token' \
          | python3 -c 'import sys, json; print(json.load(sys.stdin)["access_token"])')"

        echo "::add-mask::$TOKEN"

        echo "UV_INDEX_GAR_URL=${{ inputs.python-index-url }}" >> "$GITHUB_ENV"
        echo "UV_INDEX_GAR_USERNAME=oauth2accesstoken" >> "$GITHUB_ENV"
        echo "UV_INDEX_GAR_PASSWORD=$TOKEN" >> "$GITHUB_ENV"
        echo "UV_DEFAULT_INDEX=gar=${{ inputs.python-index-url }}" >> "$GITHUB_ENV"

    - name: Create virtual environment
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        UV_NATIVE_TLS: "true"
      run: |
        uv venv .venv --python "${{ inputs.python-version }}"

    - name: Install workflow dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        UV_NATIVE_TLS: "true"
      run: |
        set -euo pipefail

        if [ -f uv.lock ] || [ -f pyproject.toml ]; then
          uv sync --python .venv/bin/python
        elif [ -f requirements.txt ]; then
          uv pip install --python .venv/bin/python -r requirements.txt
        else
          echo "No dependency definition found. Expected one of: uv.lock, pyproject.toml, requirements.txt" >&2
          exit 1
        fi

    - name: Verify flytekit is installed
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        .venv/bin/python -c "import flytekit"

    - name: Write Flyte config
      shell: bash
      run: |
        mkdir -p ~/.flyte
        cat > ~/.flyte/config.yaml <<EOF
        admin:
          endpoint: ${{ inputs.union-endpoint }}
          insecure: false
          authType: ClientSecret
          clientId: ${{ inputs.flyte-client-id }}
          clientSecretEnvVar: FLYTE_CLIENT_SECRET
        EOF

    - name: Register workflows
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        FLYTE_CLIENT_SECRET: ${{ inputs.flyte-client-secret }}
        GRPC_DEFAULT_SSL_ROOTS_FILE_PATH: /etc/ssl/certs/ca-certificates.crt
        REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
        SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
        CURL_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      run: |
        set -euo pipefail

        uv run --python .venv/bin/python pyflyte register . \
          --project "${{ inputs.flyte-project }}" \
          --domain "${{ inputs.flyte-domain }}"
